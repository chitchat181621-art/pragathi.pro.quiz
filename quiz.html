<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white font-sans overflow-hidden">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen flex flex-col items-center justify-center h-screen animate__animated animate__fadeIn">
        <div class="login-box p-10 rounded-2xl shadow-2xl w-96 text-center border-t-4 border-cyan-500 bg-slate-900">
            <h1 class="text-4xl font-black mb-8 text-cyan-400 italic">QUIZ PRO</h1>
           <input type="text" id="username" placeholder="Enter Full Name" 
               class="w-full p-4 mb-6 rounded-lg text-black" required>
        
        <button type="button" onclick="handleLogin()" 
                class="login-btn w-full py-4 rounded-lg font-bold text-lg uppercase">
            LOGIN
        </button>
        </div>
    </div>

    <!-- CATEGORY SCREEN -->
    <div id="category-screen" class="screen hidden p-10 h-screen overflow-y-auto animate__animated animate__fadeInUp">
        <h2 class="header">Select Category</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
            <button onclick="showLevels('Logical Reasoning')" class="cat-card h-32 rounded-2xl text-xl font-bold border-b-4 border-blue-600 bg-gray-800">Logical Reasoning</button>
            <button onclick="showLevels('Computer Awareness')" class="cat-card h-32 rounded-2xl text-xl font-bold border-b-4 border-emerald-600 bg-gray-800">Computer Awareness</button>
            <button onclick="showLevels('General English')" class="cat-card h-32 rounded-2xl text-xl font-bold border-b-4 border-rose-600 bg-gray-800">General English</button>
            <button onclick="showLevels('General Knowledge')" class="cat-card h-32 rounded-2xl text-xl font-bold border-b-4 border-amber-600 bg-gray-800">General Knowledge</button>
        </div>
    </div>

    <!-- LEVEL SCREEN -->
    <div id="level-screen" class="screen hidden flex flex-col items-center justify-center h-screen animate__animated animate__zoomIn">
        <h2 id="selected-cat-title" class="text-2xl font-bold mb-10 text-cyan-300">Category Name</h2>
        <div class="flex flex-col gap-4 w-72">
            <button onclick="startQuiz('easy')" class="level-btn bg-emerald-500 hover:bg-emerald-400 py-4 rounded-xl font-black text-slate-900">EASY</button>
            <button onclick="startQuiz('medium')" class="level-btn bg-amber-500 hover:bg-amber-400 py-4 rounded-xl font-black text-slate-900">MEDIUM</button>
            <button onclick="startQuiz('hard')" class="level-btn bg-rose-600 hover:bg-rose-500 py-4 rounded-xl font-black text-white">HARD</button>
            <button onclick="showCategories()" class="mt-6 text-slate-400 hover:text-white transition">← Change Category</button>
        </div>
    </div>
             
    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="screen hidden flex flex-col items-center justify-center h-screen p-6 animate__animated animate__fadeIn">
        <div class="w-full max-w-3xl bg-blue-600 p-8 rounded-3xl border border-slate-800 shadow-2xl relative">
            <div id="timer-ring" class="absolute -top-10 left-1/2 -translate-x-1/2 w-20 h-20 bg-gray-800 rounded-full border-4 border-cyan-500 flex items-center justify-center text-2xl font-black text-cyan-400">15</div>
            
            <div class="mb-8 pt-6">
                <span id="question-number" class="text-xs uppercase tracking-widest text-cyan-500 font-bold">Question 1</span>
                <p id="question-text" class="text-2xl mt-2 font-medium">Loading question...</p>
            </div>

            <div id="options-container" class="grid grid-cols-1 gap-4"></div>

            <div class="mt-10 flex justify-end">
                <button id="next-btn" onclick="nextQuestion()" class="hidden bg-cyan-600 hover:bg-cyan-500 px-10 py-3 rounded-full font-bold animate__animated animate__bounceIn">Next →</button>
            </div>
        </div>
    </div>

    <!-- SCORE PAGE -->
    <div id="score-screen" class="screen hidden flex flex-col items-center justify-center h-screen animate__animated animate__jackInTheBox">
        <div class="text-center bg-slate-900 p-12 rounded-full border-8 border-cyan-500/20 shadow-[0_0_50px_rgba(34,211,238,0.2)]">
            <h2 class="text-2xl font-bold text-cyan-400 mb-2">QUIZ COMPLETE!</h2>
            <div class="text-8xl font-black mb-4" id="final-score-val">0</div>
            <p class="text-slate-400">Total Points Earned</p>
        </div>
        <div class="mt-10 flex gap-4">
            <button onclick="showLevels(currentCategory)" class="bg-slate-700 px-8 py-3 rounded-lg font-bold">Try Level Again</button>
            <button onclick="showCategories()" class="bg-cyan-600 px-8 py-3 rounded-lg font-bold">Home Screen</button>
        </div>
    </div>

    <!-- AUDIO ELEMENTS -->
    <audio id="sound-click" src="freesound_community-logged-in-89207 (1).mp3"></audio>
    <audio id="sound-correct" src="freesound_community-correct-6033 (1).mp3"></audio>
    <audio id="sound-wrong" src="eritnhut1992-buzzer-or-wrong-answer-20582.mp3"></audio>
    <audio id="sound-finish" src="freesound_community-bell-ringing-ii-98323.mp3"></audio>

    <script src="script.js"></script>
    <div id="level-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="modal-header">
            <span class="icon">✨</span>
            <h2>Excellent!</h2>
        </div>
        <p id="level-msg">You've completed the level!</p>
        <button id="modal-btn">Continue to Next Level</button>
    </div>
</div>
</body>
</html>
