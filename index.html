<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    padding: 0;
    /* This creates that smooth gradient background from your screenshot */
    background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 50%, #f093fb 100%);
    min-height: 100vh;
    font-family: sans-serif;
}

.main-container {
    display: flex;
    flex-direction: column;
    align-items: center; /* Centers everything horizontally */
    text-align: center;
    padding: 20px;
}

.college-title {
    font-size: 1.5rem;
    font-weight: bold;
    font-style: italic;
    margin-bottom: 20px;
}

.hero-image {
    width: 90%; /* Responsive width */
    max-width: 500px;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.quiz-section {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.quiz-button {
    display: inline-block;
    padding: 10px 20px;
    background-color: white;
    color: black;
    text-decoration: none;
    border: 1px solid #ccc;
    border-radius: 5px;
    margin-top: 10px;
    font-weight: bold;
}

.small-logo {
    width: 60px;
    height: auto;
    margin-bottom: 10px;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    width: 100%;
    overflow-x: hidden; /* Prevents side-scrolling */
}

body {
    /* Replace this with your specific gradient colors */
    background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}
</style>
</head>

<body>
    
   <div class="main-container">
    <h1 class="college-title">PRAGATHI COLLEGE OF SCIENCE<br>
         AND MANAGEMENT STUDIES</h1>
    
    <div class="image-section">
        <img src="pragathi.jpeg" alt="College Building" class="hero-image">
    </div>

    <div class="quiz-section">
        <img src="p22.jpeg" alt="Logo" class="small-logo">
        <p>click 👇 link for quiz</p>
        <a href="https://chitchat181621-art.github.io/quizzzz.pro-/" class="quiz-button">start the quiz</a>

    </div>
</div>

    
    
</body>
</html>
